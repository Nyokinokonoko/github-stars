name: Update stars catalog

on:
  schedule:
    # Weekly, Mondays 06:00 UTC.
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      force:
        description: "Re-categorize every repo (after taxonomy edits)"
        type: boolean
        default: false

# Allow the job to commit generated data + catalog back to the repo.
permissions:
  contents: write

concurrency:
  group: update-stars
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update stars catalog
        env:
          GH_USER: nyokinokonoko
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python scripts/stars.py ${{ github.event.inputs.force == 'true' && '--force' || '' }}

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ catalog/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update stars catalog"
            git push
          fi
