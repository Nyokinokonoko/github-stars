<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⭐ GitHub Stars Catalog</title>
  <meta name="description" content="Searchable, categorized catalog of GitHub stars." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%AD%90%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="style.css" />
  <script>
    // Apply saved/system theme before paint to avoid a flash.
    (function () {
      try {
        var saved = localStorage.getItem('theme');
        var dark = saved ? saved === 'dark'
          : window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.dataset.theme = dark ? 'dark' : 'light';
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">★</span>
        <div class="brand-text">
          <h1>GitHub&nbsp;Stars</h1>
          <p class="tagline" id="tagline">Loading catalog…</p>
        </div>
      </div>
      <div class="header-actions">
        <a class="btn icon" id="repo-link"
           href="https://github.com/Nyokinokonoko/github-stars"
           target="_blank" rel="noopener"
           aria-label="View repository on GitHub" title="View repository">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round"
               stroke-linejoin="round" aria-hidden="true">
            <line x1="6" y1="3" x2="6" y2="15"></line>
            <circle cx="18" cy="6" r="3"></circle>
            <circle cx="6" cy="18" r="3"></circle>
            <path d="M18 9a9 9 0 0 1-9 9"></path>
          </svg>
        </a>
        <button class="btn icon" id="theme-toggle" type="button"
                aria-label="Toggle dark mode" title="Toggle theme">◐</button>
      </div>
    </div>
  </header>

  <section class="controls" id="controls">
    <div class="wrap">
      <div class="controls-top">
        <button class="filters-toggle" id="filters-toggle" type="button"
                aria-expanded="true" aria-controls="language sort categories"
                aria-label="Toggle filters" title="Toggle filters">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round"
               stroke-linejoin="round" aria-hidden="true">
            <line x1="4" y1="6" x2="20" y2="6"></line>
            <line x1="7" y1="12" x2="17" y2="12"></line>
            <line x1="10" y1="18" x2="14" y2="18"></line>
          </svg>
        </button>
        <div class="search-wrap">
          <span class="search-icon" aria-hidden="true">⌕</span>
          <input id="search" type="search" autocomplete="off" spellcheck="false"
                 placeholder="Search name, summary, tag, language…" aria-label="Search repositories" />
        </div>
        <div class="select-group">
          <label class="select">
            <span>Language</span>
            <select id="language" aria-label="Filter by language"></select>
          </label>
          <label class="select">
            <span>Sort</span>
            <select id="sort" aria-label="Sort order">
              <option value="stars">Most stars</option>
              <option value="recent">Recently starred</option>
              <option value="name">Name (A–Z)</option>
            </select>
          </label>
        </div>
      </div>

      <div class="pills" id="categories" role="group" aria-label="Filter by category"></div>
      <div class="active-tags" id="active-tags" hidden></div>

      <p class="result-count" id="result-count" aria-live="polite"></p>
    </div>
  </section>

  <main class="wrap">
    <div class="results" id="results"></div>
    <div class="empty" id="empty" hidden>
      <p>No repositories match your filters.</p>
      <button class="btn" id="clear-filters" type="button">Clear all filters</button>
    </div>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <span id="footer-meta"></span>
      <span>·</span>
      <a href="https://github.com/Nyokinokonoko/github-stars" target="_blank" rel="noopener">source</a>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
